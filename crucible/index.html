<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucible — AI Capabilities & Project Ideas</title>
  <meta name="description" content="What tasks to get good at, what things to create. Curated AI capabilities with ready-made agent architectures.">
  <meta property="og:title" content="Crucible — AI Capabilities & Project Ideas">
  <meta property="og:description" content="Pick an idea. Be the bellows. Agents do the rest.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://forge.thisminute.org/crucible/">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='80'>%F0%9F%94%A5</text></svg>">
  <script defer data-domain="forge.thisminute.org" src="https://plausible.io/js/script.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #111118;
      --bg-raised: #1a1a24;
      --bg-card: #1e1e2a;
      --bg-card-hover: #262636;
      --accent: #10b981;
      --accent-dim: rgba(16, 185, 129, 0.12);
      --accent-text: #34d399;
      --text: #e4e4ed;
      --text-secondary: #9898ad;
      --text-muted: #5e5e73;
      --border: rgba(255, 255, 255, 0.07);
      --border-light: rgba(255, 255, 255, 0.12);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --radius: 10px;
      --radius-sm: 6px;
      color-scheme: dark;
    }
    body.light-mode {
      --bg: #faf8f5;
      --bg-raised: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f0faf5;
      --accent: #059669;
      --accent-dim: rgba(5, 150, 105, 0.1);
      --accent-text: #047857;
      --text: #1c1917;
      --text-secondary: #57534e;
      --text-muted: #a8a29e;
      --border: rgba(0, 0, 0, 0.08);
      --border-light: rgba(0, 0, 0, 0.14);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      color-scheme: light;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--text);
    }
    .header h1 a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.5em;
      vertical-align: middle;
      letter-spacing: 0.15em;
    }
    .header h1 a:hover { color: var(--text-secondary); }
    .header .tagline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }

    .filter-btn {
      padding: 0.4rem 0.75rem;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent-text);
    }

    .stats {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .idea-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .idea-card {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .idea-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .idea-card .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .idea-card h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent-text);
    }
    .idea-card .problem {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }
    .idea-card .meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-complexity {
      background: var(--accent-dim);
      color: var(--accent-text);
    }
    .badge-category {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-secondary);
    }
    .badge-model {
      background: rgba(139, 92, 246, 0.12);
      color: #a78bfa;
    }
    body.light-mode .badge-model {
      background: rgba(139, 92, 246, 0.1);
      color: #7c3aed;
    }

    .idea-detail {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .idea-card.expanded .idea-detail { display: block; }

    .detail-section {
      margin-bottom: 1rem;
    }
    .detail-section h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .detail-section p, .detail-section li {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .detail-section ul {
      list-style: none;
      padding: 0;
    }
    .detail-section li {
      padding: 0.25rem 0;
      padding-left: 1rem;
      position: relative;
    }
    .detail-section li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.65rem;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    .role-name {
      color: var(--accent-text);
      font-weight: 600;
    }

    .arch-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
    }
    .arch-box .arch-rationale {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.5rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
    }
    .icon-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .icon-btn:hover {
      border-color: var(--border-light);
      color: var(--text);
    }
    .other-projects {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      font-size: 0.7rem;
    }
    .other-projects-label {
      color: var(--text-muted);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .other-projects a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .other-projects a:hover {
      color: var(--accent-text);
    }
    .other-projects a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }
    .search-box:focus-visible, .filter-btn:focus-visible, .idea-card:focus-visible, .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .header h1 { font-size: 1.5rem; }
      .controls { flex-direction: column; }
      .other-projects { position: static; justify-content: center; margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="theme-toggle">
    <button class="icon-btn" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
      <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
        <path d="M8 1a.5.5 0 01.5.5v1a.5.5 0 01-1 0v-1A.5.5 0 018 1zm0 11a.5.5 0 01.5.5v1a.5.5 0 01-1 0v-1A.5.5 0 018 12zm7-4a.5.5 0 01-.5.5h-1a.5.5 0 010-1h1A.5.5 0 0115 8zM4 8a.5.5 0 01-.5.5h-1a.5.5 0 010-1h1A.5.5 0 014 8zm8.95-3.54a.5.5 0 010 .71l-.71.71a.5.5 0 11-.71-.71l.71-.71a.5.5 0 01.71 0zM4.46 11.46a.5.5 0 010 .71l-.7.71a.5.5 0 11-.71-.71l.7-.71a.5.5 0 01.71 0zm8.49 1.42a.5.5 0 01-.71 0l-.71-.71a.5.5 0 01.71-.71l.71.71a.5.5 0 010 .71zM4.46 4.54a.5.5 0 01-.71 0l-.7-.71a.5.5 0 11.7-.71l.71.71a.5.5 0 010 .71zM8 4.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7z" fill="currentColor"/>
      </svg>
      <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 .278a.77.77 0 01.08.858 7.2 7.2 0 00-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.79.79 0 01.81.316.73.73 0 01-.031.893A8.35 8.35 0 018.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 016 .278z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <main class="container">
    <nav class="other-projects" aria-label="Cross-site navigation">
      <span class="other-projects-label">Also:</span>
      <a href="/rhizome/">Rhizome</a>
      <a href="/toolshed/">Toolshed</a>
      <a href="/forge/">Agent Forge</a>
    </nav>
    <header class="header">
      <h1>CRUCIBLE <a href="/">FORGE</a></h1>
      <p class="tagline">What to get good at. What to create. Be the bellows.</p>
    </header>

    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="Search capabilities and ideas..." aria-label="Search capabilities and ideas">
      <div id="filters"></div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="idea-grid" id="grid"></div>
  </main>

  <script src="data.js"></script>
  <script>
    const ideas = window.CRUCIBLE_IDEAS || [];
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const filters = document.getElementById('filters');
    const stats = document.getElementById('stats');

    let activeCategory = null;
    let activeComplexity = null;
    let activeModel = null;

    // Build filter buttons
    const categories = [...new Set(ideas.map(i => i.category))].sort();
    const complexities = ['weekend', 'week', 'month', 'multi-month'];
    const models = ['steward', 'checkpoint', 'protocol-forum'];

    function makeFilters(items, type, labelFn) {
      return items.map(item => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = labelFn ? labelFn(item) : item;
        btn.dataset.type = type;
        btn.dataset.value = item;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => toggleFilter(type, item, btn));
        return btn;
      });
    }

    const allFilters = [
      ...makeFilters(complexities, 'complexity'),
      ...makeFilters(models, 'model', m => m === 'protocol-forum' ? 'protocol+forum' : m),
      ...makeFilters(categories, 'category'),
    ];
    allFilters.forEach(btn => filters.appendChild(btn));

    function toggleFilter(type, value, btn) {
      const isActive = btn.classList.contains('active');
      // Clear other filters of same type
      document.querySelectorAll(`.filter-btn[data-type="${type}"]`).forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
      if (type === 'category') activeCategory = isActive ? null : value;
      else if (type === 'complexity') activeComplexity = isActive ? null : value;
      else if (type === 'model') activeModel = isActive ? null : value;
      if (!isActive) { btn.classList.add('active'); btn.setAttribute('aria-pressed', 'true'); }
      render();
    }

    function matchesSearch(idea, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      return idea.title.toLowerCase().includes(q)
        || idea.problem.toLowerCase().includes(q)
        || idea.approach.toLowerCase().includes(q)
        || (idea.capability && idea.capability.toLowerCase().includes(q))
        || idea.tags.some(t => t.toLowerCase().includes(q))
        || idea.agentArchitecture.roles.some(r => r.role.toLowerCase().includes(q) || r.description.toLowerCase().includes(q));
    }

    function render() {
      const query = search.value.trim();
      const filtered = ideas.filter(idea => {
        if (!matchesSearch(idea, query)) return false;
        if (activeCategory && idea.category !== activeCategory) return false;
        if (activeComplexity && idea.complexity !== activeComplexity) return false;
        if (activeModel && idea.agentArchitecture.coordinationModel !== activeModel) return false;
        return true;
      });

      stats.textContent = `${filtered.length} idea${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">No ideas match your filters.</div>';
        return;
      }

      grid.innerHTML = filtered.map(idea => {
        const arch = idea.agentArchitecture;
        const modelLabel = arch.coordinationModel === 'protocol-forum' ? 'protocol+forum' : arch.coordinationModel;
        return `
          <div class="idea-card" tabindex="0" data-id="${esc(idea.id)}" role="button" aria-expanded="false">
            <div class="card-top">
              <h3>${esc(idea.title)}</h3>
              <div class="meta">
                <span class="badge badge-complexity">${esc(idea.complexity)}</span>
                <span class="badge badge-model">${esc(modelLabel)}</span>
              </div>
            </div>
            ${idea.capability ? `<p style="font-size:0.78rem;color:var(--accent-text);opacity:0.7;margin-bottom:0.35rem;font-style:italic">Capability: ${esc(idea.capability)}</p>` : ''}
            <p class="problem">${esc(idea.problem)}</p>
            <div class="meta">
              <span class="badge badge-category">${esc(idea.category)}</span>
              ${idea.tags.slice(0, 4).map(t => `<span class="badge badge-category">${esc(t)}</span>`).join('')}
            </div>

            <div class="idea-detail">
              <div class="detail-section">
                <h4>Why AI</h4>
                <p>${esc(idea.whyAi)}</p>
              </div>
              <div class="detail-section">
                <h4>Approach</h4>
                <p>${esc(idea.approach)}</p>
              </div>
              <div class="detail-section">
                <h4>Agent Architecture — ${esc(modelLabel)}</h4>
                <div class="arch-box">
                  <ul>
                    ${arch.roles.map(r => `<li><span class="role-name">${esc(r.role)}</span> — ${esc(r.description)}</li>`).join('')}
                  </ul>
                  ${arch.patterns && arch.patterns.length ? `<p style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted)">Patterns: ${arch.patterns.map(p => esc(p)).join(', ')}</p>` : ''}
                  <p class="arch-rationale">${esc(arch.rationale)}</p>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      // Re-bind expand/collapse
      grid.querySelectorAll('.idea-card').forEach(card => {
        card.addEventListener('click', () => {
          const wasExpanded = card.classList.contains('expanded');
          card.classList.toggle('expanded');
          card.setAttribute('aria-expanded', !wasExpanded);
        });
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    search.addEventListener('input', render);
    render();

    // Theme toggle (shared with portal)
    const savedTheme = (() => { try { return localStorage.getItem('thisminute_theme'); } catch { return null; } })();
    const lightMode = savedTheme ? savedTheme === 'light'
      : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    function applyTheme(isLight) {
      document.body.classList.toggle('light-mode', isLight);
      document.getElementById('theme-icon-dark').style.display = isLight ? 'block' : 'none';
      document.getElementById('theme-icon-light').style.display = isLight ? 'none' : 'block';
      try { localStorage.setItem('thisminute_theme', isLight ? 'light' : 'dark'); } catch {}
    }
    applyTheme(lightMode);
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
        try { if (!localStorage.getItem('thisminute_theme')) applyTheme(e.matches); } catch {}
      });
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      applyTheme(!document.body.classList.contains('light-mode'));
    });
  </script>

</body>
</html>
