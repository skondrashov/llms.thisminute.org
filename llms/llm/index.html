<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>f(tokens) → token — forge.thisminute.org</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='80'>%C6%92</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #07090f;
  --surface: #0b0f18;
  --border: #141c2c;
  --text: #b0bccf;
  --text-bright: #d8e0ec;
  --text-dim: #4a5878;
  --text-muted: #283048;
  --accent: #d4a843;
}

body {
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(70,90,160,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(160,130,50,0.03) 0%, transparent 40%);
}

.page {
  max-width: 700px;
  width: 100%;
  padding: 0 28px;
}

/* --- Header --- */
header {
  margin-bottom: 28px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px 20px;
}
header h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.6rem;
  color: var(--text-bright);
}
.formula {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1rem, 2.5vw, 1.35rem);
  color: var(--accent);
  letter-spacing: 0.02em;
}

/* --- Token display --- */
.token-area {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 20px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.token-area.reading {
  border-color: rgba(255,255,255,0.08);
  box-shadow: 0 0 24px rgba(255,255,255,0.02);
}
#tokens {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: flex-start;
  min-height: 120px;
  align-content: flex-start;
}

.brk { flex-basis: 100%; height: 5px; }

/* --- Tokens --- */
.tk {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.5;
  white-space: nowrap;
  transition: filter 0.12s, background 0.12s;
  border: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
  background: rgba(255,255,255,0.025);
}

/* Role tokens — just a subtle tint. They're token IDs like any other;
   the model learned their meaning from training data patterns. */
.tk.ru {
  background: rgba(107,184,224,0.06);
  border-color: rgba(107,184,224,0.1);
}
.tk.ra {
  background: rgba(93,196,158,0.06);
  border-color: rgba(93,196,158,0.1);
}

/* Latest predicted token */
.tk.lt {
  color: var(--accent);
  background: rgba(212,168,67,0.1);
  border-color: rgba(212,168,67,0.18);
  animation: pop 0.28s cubic-bezier(0.34,1.56,0.64,1);
}

/* Flash: model is reading */
.tk.fl {
  filter: brightness(1.6);
  background: rgba(255,255,255,0.05) !important;
}

@keyframes pop {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
/* Batch entrance — user input arrives all at once */
.tk.bt {
  animation: batch-in 0.2s ease;
}
@keyframes batch-in {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Meta --- */
.meta { margin-bottom: 18px; }

.status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.76rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  min-height: 1.2em;
}
.status strong { color: var(--accent); font-weight: 600; }

.note {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.55;
  max-width: 540px;
}

/* --- Controls --- */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.controls button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  padding: 6px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  color: var(--text-dim);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.controls button:hover:not(:disabled) {
  border-color: #1e2a40;
  color: var(--text);
  background: rgba(255,255,255,0.04);
}
.controls button:disabled { opacity: 0.3; cursor: default; }
.controls button:active:not(:disabled) { transform: scale(0.97); }

/* --- Nav --- */
nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  transition: color 0.15s;
}
nav a:hover { color: var(--text-dim); }

/* --- Small screens --- */
@media (max-height: 620px) {
  header h1 { font-size: 1.3rem; }
  header { margin-bottom: 16px; }
  .token-area { padding: 14px 16px; margin-bottom: 14px; }
  .tk { font-size: 0.7rem; padding: 2px 6px; }
  .brk { height: 3px; }
  #tokens { min-height: 80px; gap: 3px; }
  .meta { margin-bottom: 12px; }
}
@media (max-width: 520px) {
  .page { padding: 0 16px; }
  header { flex-direction: column; gap: 4px; }
  .tk { font-size: 0.7rem; padding: 2px 6px; }
}
</style>
</head>
<body>

<div class="page">
  <header>
    <span class="formula">f(all preceding tokens) &rarr; one token</span>
  </header>

  <div class="token-area" id="area">
    <div id="tokens"></div>
  </div>

  <div class="meta">
    <div class="status" id="status"></div>
    <div class="note">The model is stateless. It doesn&rsquo;t know which tokens it generated and which you typed. It doesn&rsquo;t know which are recent and which are old. It just sees a flat sequence of tokens and predicts the next one.</div>
  </div>

  <div class="controls">
    <button onclick="doReset()">Reset</button>
    <button onclick="doStep()" id="sbtn">Step</button>
    <button onclick="doPlay()" id="pbtn">Play</button>
  </div>

  <nav><a href="/llms/">&larr; Anatomy of an Agent</a></nav>
</div>

<script>
var T = [
  {t:'user',r:1},{t:'What'},{t:'is'},{t:'the'},{t:'capital'},{t:'of'},{t:'France'},{t:'?'},
  {t:'assistant',r:2},{t:'The'},{t:'capital'},{t:'of'},{t:'France'},{t:'is'},{t:'Paris'},{t:'.'},
  {t:'user',r:1},{t:'And'},{t:'Germany'},{t:'?'},
  {t:'assistant',r:2},{t:'The'},{t:'capital'},{t:'of'},{t:'Germany'},{t:'is'},{t:'Berlin'},{t:'.'}
];

// First 9 tokens ([user] prompt + [assistant] marker) are visible from the start
var START = 9;

// Events: batch = user input (all at once), gen = model predicts (one token)
var EV = [
  {n:1, g:1},     // The
  {n:1, g:1},     // capital
  {n:1, g:1},     // of
  {n:1, g:1},     // France
  {n:1, g:1},     // is
  {n:1, g:1},     // Paris
  {n:1, g:1},     // .
  {n:5},          // [user] And Germany ? [assistant]
  {n:1, g:1},     // The
  {n:1, g:1},     // capital
  {n:1, g:1},     // of
  {n:1, g:1},     // Germany
  {n:1, g:1},     // is
  {n:1, g:1},     // Berlin
  {n:1, g:1},     // .
];

var vis = START; // visible token count
var ei = 0;     // event index
var busy = false;
var playing = false;

function render(newCount, isGen) {
  var h = '';
  for (var i = 0; i < vis; i++) {
    if (T[i].r && i > 0) h += '<div class="brk"></div>';
    var c = 'tk';
    if (T[i].r === 1) c += ' ru';
    else if (T[i].r === 2) c += ' ra';
    if (newCount && i >= vis - newCount) c += isGen ? ' lt' : ' bt';
    h += '<span class="' + c + '">' + T[i].t + '</span>';
  }
  document.getElementById('tokens').innerHTML = h;
}

function status() {
  var el = document.getElementById('status');
  if (ei === 0) {
    el.textContent = vis + ' tokens in context';
  } else if (ei >= EV.length) {
    el.textContent = 'complete \u2014 ' + T.length + ' tokens';
  } else if (EV[ei - 1].g) {
    el.innerHTML = 'reads ' + (vis - 1) + ' tokens \u2192 <strong>' + T[vis - 1].t + '</strong>';
  } else {
    el.textContent = vis + ' tokens in context';
  }
  document.getElementById('sbtn').disabled = ei >= EV.length;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function doStep() {
  if (ei >= EV.length || busy) return;
  busy = true;
  var ev = EV[ei];

  if (ev.g) {
    // Generation: flash all existing tokens, then predict
    var area = document.getElementById('area');
    var tks = document.querySelectorAll('#tokens .tk');
    area.classList.add('reading');
    tks.forEach(function(t) { t.classList.add('fl'); });
    await sleep(280);
    tks.forEach(function(t) { t.classList.remove('fl'); });
    area.classList.remove('reading');
    await sleep(80);
  }

  vis += ev.n;
  ei++;
  render(ev.n, !!ev.g);
  status();
  busy = false;
}

function doReset() {
  playing = false;
  document.getElementById('pbtn').textContent = 'Play';
  vis = START; ei = 0;
  render(0, false);
  status();
}

function doPlay() {
  if (playing) {
    playing = false;
    document.getElementById('pbtn').textContent = 'Play';
    return;
  }
  playing = true;
  document.getElementById('pbtn').textContent = 'Pause';
  (async function go() {
    if (!playing || ei >= EV.length) {
      playing = false;
      document.getElementById('pbtn').textContent = 'Play';
      return;
    }
    await doStep();
    var delay = EV[ei - 1].g ? 600 : 1000;
    await sleep(delay);
    go();
  })();
}

render(0, false);
status();
</script>
</body>
</html>
